kind = "web"
previewPath = "/"
title = "CarMaint Pro"
version = "1.0.0"
id = "artifacts/carmaint-pro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22724
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/carmaint-pro run dev"

[services.env]
PORT = "22724"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/carmaint-pro", "run", "build"]
publicDir = "artifacts/carmaint-pro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
